# configs/residential_0079.yaml
# Team KITTI Splat Configuration

experiment:
  name: "residential_0079"
  workspace: "output/exp_0079"
  device: "cuda"

data:
  # Paths mapped directly to your untracked data directory
  image_dir: "data/image_02"
  lidar_dir: "data/velodyne_points"
  oxts_dir: "data/oxts"
  calib_cam_to_cam: "data/calib_cam_to_cam.txt"
  calib_velo_to_cam: "data/calib_velo_to_cam.txt"
  calib_imu_to_velo: "data/calib_imu_to_velo.txt"

model:
  sh_degree: 3
  white_background: false # KITTI is outdoor, so background should be black (0.0, 0.0, 0.0)

training:
  iterations: 30000
  
  # Learning Rates
  lr_xyz: 0.00016
  lr_f_dc: 0.0025
  lr_f_rest: 0.000125
  lr_opacity: 0.05
  lr_scaling: 0.005
  lr_rotation: 0.001
  
  # Loss Weights
  lambda_dssim: 0.2

densification:
  # Adaptive Density Control (ADC) Thresholds
  start_iteration: 500
  end_iteration: 15000
  interval: 100
  grad_threshold: 0.0002
  opacity_threshold: 0.005
  percent_dense: 0.01
  spatial_extent: 10.0 # Standard spatial bounding for KITTI scenes