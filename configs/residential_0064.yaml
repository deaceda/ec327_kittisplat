# configs/residential_064.yaml
# Team KITTI Splat Configuration

experiment:
  name: "residential_0064_full"
  workspace: "output/exp_0064"
  device: "cuda"

data:
  # Paths mapped directly to your untracked data directory
  image_dir: "data/image_02"
  lidar_dir: "data/velodyne_points"
  oxts_dir: "data/oxts"
  calib_cam_to_cam: "data/calib_cam_to_cam.txt"
  calib_velo_to_cam: "data/calib_velo_to_cam.txt"
  calib_imu_to_velo: "data/calib_imu_to_velo.txt"
  limit_frames: 50
  downsample_rate: 5

model:
  sh_degree: 1
  white_background: true 

training:
  iterations: 30000
  
  # Learning Rates
  lr_xyz: 0.00016
  lr_f_dc: 0.0025           
  lr_f_rest: 0.000125
  lr_opacity: 0.05
  lr_scaling: 0.005
  lr_rotation: 0.001
  
  # Loss Weights
  lambda_dssim: 0.4

densification:
  # Adaptive Density Control (ADC) Thresholds
  start_iteration: 500
  end_iteration: 25000    
  interval: 100
  grad_threshold: 0.0002
  opacity_threshold: 0.05
  percent_dense: 0.01
  spatial_extent: 100.0